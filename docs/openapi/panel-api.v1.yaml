openapi: 3.0.3
info:
  title: Lenker Panel API
  version: 0.1.0-draft
  description: Draft OpenAPI contract for the currently implemented Lenker panel-api MVP v0.1 backend surface.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Plans
  - name: Subscriptions
  - name: Nodes
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
  /api/v1/auth/admin/login:
    post:
      tags: [Auth]
      summary: Authenticate a panel admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Admin authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/InactiveAdmin"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      responses:
        "200":
          description: Users list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Users]
      summary: Get a user
      responses:
        "200":
          description: User details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Users]
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users/{id}/suspend:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Users]
      summary: Suspend a user
      responses:
        "200":
          description: User suspended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users/{id}/activate:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Users]
      summary: Activate a user
      responses:
        "200":
          description: User activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/plans:
    get:
      tags: [Plans]
      summary: List plans
      responses:
        "200":
          description: Plans list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Plans]
      summary: Create a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "201":
          description: Plan created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/plans/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Plans]
      summary: Get a plan
      responses:
        "200":
          description: Plan details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Plans]
      summary: Update a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanRequest"
      responses:
        "200":
          description: Plan updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/plans/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Plans]
      summary: Archive a plan
      responses:
        "200":
          description: Plan archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions:
    get:
      tags: [Subscriptions]
      summary: List subscriptions
      responses:
        "200":
          description: Subscriptions list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Subscriptions]
      summary: Create a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Subscriptions]
      summary: Get a subscription
      responses:
        "200":
          description: Subscription details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Subscriptions]
      summary: Update a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionRequest"
      responses:
        "200":
          description: Subscription updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}/renew:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Subscriptions]
      summary: Manually renew a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewSubscriptionRequest"
      responses:
        "200":
          description: Subscription renewed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes:
    get:
      tags: [Nodes]
      summary: List managed nodes
      responses:
        "200":
          description: Nodes list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/register:
    post:
      tags: [Nodes]
      summary: Register a node agent
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterNodeRequest"
      responses:
        "201":
          description: Node registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterNodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidBootstrapToken"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/bootstrap-token:
    post:
      tags: [Nodes]
      summary: Create a one-time node bootstrap token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodeBootstrapTokenRequest"
      responses:
        "201":
          description: Bootstrap token created. The plaintext token is returned only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeBootstrapTokenEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Nodes]
      summary: Get a managed node
      responses:
        "200":
          description: Node details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Nodes]
      summary: List node config revisions
      description: Returns signed deterministic subscription-aware config payload metadata. This foundation does not control the Xray runtime.
      responses:
        "200":
          description: Config revisions list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Nodes]
      summary: Create signed config revision metadata
      description: Creates metadata for a deterministic subscription-aware VLESS Reality Xray config skeleton payload. It does not restart processes or execute rollback.
      responses:
        "201":
          description: Config revision metadata created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions/pending:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Nodes]
      summary: Fetch latest pending config revision metadata for a node
      description: Node-agent endpoint. Requires the node Bearer token and returns only the latest pending signed config payload metadata for the node in the path. The agent serializes local artifacts before reporting applied; this endpoint does not control Xray.
      responses:
        "200":
          description: Latest pending config revision metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Node is unknown, token does not match, node is disabled, or no pending revision exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions/{revisionId}:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
        description: Config revision identifier.
    get:
      tags: [Nodes]
      summary: Get node config revision metadata
      responses:
        "200":
          description: Config revision metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions/{revisionId}/rollback:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
        description: Applied config revision identifier to use as rollback source.
    post:
      tags: [Nodes]
      summary: Create rollback config revision metadata
      description: Admin endpoint. Creates a new pending revision from an applied target revision payload. The node-agent applies it through the normal polling path; panel-api does not mutate node files or restart Xray.
      responses:
        "201":
          description: Rollback config revision metadata created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions/{revisionId}/report:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
        description: Config revision identifier.
    post:
      tags: [Nodes]
      summary: Report node config revision apply status
      description: Node-agent endpoint. Requires the node Bearer token and records applied or failed metadata status for a pending revision owned by the node. Applied means the node-agent verified hash/signature, passed the Xray compatibility validation gate, and completed the local staged-to-active file switch. Failed reports keep node active_revision unchanged and may include compact reasons such as invalid_xray_config:missing_stream_settings. This endpoint does not execute rollback or control Xray.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigRevisionReportRequest"
      responses:
        "200":
          description: Config revision status recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/drain:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Mark a node as draining
      responses:
        "200":
          description: Node marked as draining.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/undrain:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Return a node to active drain state
      responses:
        "200":
          description: Node undrained.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/disable:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Disable a node
      responses:
        "200":
          description: Node disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/enable:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Enable a disabled node
      responses:
        "200":
          description: Node enabled as unhealthy until the next heartbeat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/heartbeat:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Record a node heartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeHeartbeatRequest"
      responses:
        "200":
          description: Heartbeat accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeHeartbeatEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: session-token
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier.
  responses:
    BadRequest:
      description: Invalid request body or validation failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Missing or invalid admin session token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidCredentials:
      description: Admin credentials are invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InactiveAdmin:
      description: Admin account is inactive.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidBootstrapToken:
      description: Node bootstrap token is invalid, expired, or already used.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    SuccessEnvelope:
      type: object
      required: [data]
      properties:
        data:
          description: Successful response payload.
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
    ErrorCode:
      type: string
      enum:
        - bad_request
        - unauthorized
        - not_found
        - validation_error
        - storage_error
        - internal_error
        - invalid_credentials
        - inactive_admin
        - invalid_bootstrap_token
        - expired_bootstrap_token
        - bootstrap_token_used
    HealthEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ok]
    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AdminLoginEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [admin, session]
              properties:
                admin:
                  $ref: "#/components/schemas/Admin"
                session:
                  $ref: "#/components/schemas/AdminSession"
    Admin:
      type: object
      required: [id, email, status, two_factor_enabled, created_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, suspended]
        two_factor_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true
    AdminSession:
      type: object
      required: [id, admin_id, token, expires_at, created_at]
      properties:
        id:
          type: string
        admin_id:
          type: string
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    User:
      type: object
      required: [id, email, status, display_name]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, suspended, expired]
        display_name:
          type: string
    UserEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"
    UserListEnvelope:
